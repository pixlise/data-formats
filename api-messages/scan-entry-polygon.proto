syntax = "proto3";
option go_package = ".;protos";

import "image-beam-location.proto";

// Defines a polygon that can be drawn where a scan point is. This can be tinted to
// allow visualising maps of data over the scan area

message Rectangle
{
    double x = 1;
    double y = 2;
    double w = 3;
    double h = 4;
}

message ScanEntryPolygon
{
    // Ideally we'd prefer Coordinate2D to have x,y not i,j here...
    repeated Coordinate2D points = 1;
    Rectangle bbox = 2;
}

message HullPoint
{
    // Ideally we'd prefer Coordinate2D to have x,y not i,j here...
	Coordinate2D point = 1;
    // Ideally we'd prefer Coordinate2D to have x,y not i,j here...
	Coordinate2D normal = 2;
	uint64 scanEntryIndex = 3;
}

message PointCluster
{
    repeated uint64 scanEntryIndexes = 1;
    double averagePointDistance = 2;
	double angleRadiansToImage = 3;
	repeated HullPoint footprintPoints = 4;
}

message Footprint
{
	repeated HullPoint hullPoints = 1;
}

message ScanPoint
{
    uint64 PMC = 1;
	Coordinate2D coord = 2;
	uint64 locationIdx = 3;
	bool hasNormalSpectra = 4;
	bool hasDwellSpectra = 5;
	bool hasPseudoIntensities = 6;
	bool hasMissingData = 7;
}