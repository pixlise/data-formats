syntax = "proto3";
option go_package = ".;protos";

import "ownership-access.proto";



////////////////////////////////////////////////////////////////
// Getting the current ownership state of an object

// requires(NONE)
message GetOwnershipReq
{
    string objectId = 1;
    // Do we need this?
    ObjectType objectType = 2;
}

message GetOwnershipResp
{
    OwnershipItem ownership = 1;
}

////////////////////////////////////////////////////////////////
// Even if we have no access to this item, here we can query
// a description of it (basically it's name field) so we can
// display more meaningful error messages about items the user
// has no access to, so they can ask for access!

// requires(NONE)
message GetOwnershipDescriptionReq
{
    string objectId = 1;
    ObjectType objectType = 2;
}

message GetOwnershipDescriptionResp
{
    string name = 1;
    UserInfo creatorUser = 2;
}

////////////////////////////////////////////////////////////////
// Adding viewers to an object (sharing/unsharing)

// requires(NONE)
message ObjectEditAccessReq
{
    string objectId = 1;
    // Do we need this?
    ObjectType objectType = 2;

    UserGroupList addViewers = 3;
    UserGroupList deleteViewers = 4;
    
    UserGroupList addEditors = 5;
    UserGroupList deleteEditors = 6;
}

message ObjectEditAccessResp
{
    OwnershipItem ownership = 1;
}
