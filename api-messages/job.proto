// Which API instance wants to handle this job? This is only used
// when it's an external request and APIs realise that an unknown
// job got completed. Now one will have to handle things like
// notification, so at that point all APIs will write their instance
// ID here, wait a little, then read it back. The API matching the
// written instance ID gets to do the job!
message JobHandlerDBItem {
    string id = 1; // @gotags: bson:"_id,omitempty"

    string jobId = 2;
    string handlerInstanceId = 3;
    uint32 timeStampUnixSec = 4;
}

// Individual jobs are written to the job queue. If a Job (above) involves multiple sub-jobs (eg PIQUANT run)
// then a single entry exists in the JobStatus table, but JobQueue will contain one for each sub-job. This way
// it can be individually run on a node (eg in a docker container on another machine) and accounted for when
// it completes/fails. Once all JobQueueItems for a given job group are complete, its completion code can run
// and it then gets removed from the job queue
message JobQueueItem
{
    string jobId = 1; // @gotags: bson:"_id,omitempty"

    // Include enough info to be able to start the job just using this structure! These form the
    // S3 path to the job, where the job param JSON should be waiting
    string jobGroupId = 2;
    string associatedScanId = 7;
    uint32 nodeIndex = 8;

    int64 createdTimeStampUnixSec = 3;
    int64 lastUpdatedTimeStampUnixSec = 4;

    enum State
    {
		UNKNOWN = 0; // https://protobuf.dev/programming-guides/dos-donts/ says specify an unknown as 0
        RUNNING = 1;
        COMPLETE = 2;
        FAILED = 3;
    }

    State state = 5;
    string message = 6;
    string instanceId = 9;
}